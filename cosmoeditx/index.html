<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Editor - Noir Violet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #0a0a0a;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a855f7 50%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .btn {
            background: transparent;
            color: #ffffff;
            border: 2px solid #a855f7;
            padding: 12px 24px;
            border-radius: 0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: #a855f7;
            color: #000000;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .btn-secondary {
            border-color: #333333;
            color: #888888;
        }

        .btn-secondary:hover {
            background: #1a1a1a;
            color: #ffffff;
            border-color: #555555;
            box-shadow: none;
        }

        .btn-success {
            border-color: #7c3aed;
            background: #7c3aed;
            color: #ffffff;
        }

        .btn-success:hover {
            background: #6d28d9;
            border-color: #6d28d9;
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.6);
        }

        /* Main Layout */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Video Preview Area */
        .preview-section {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 25px;
            position: relative;
        }

        .preview-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #a855f7, transparent);
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #000000;
            border: 2px solid #1a1a1a;
            aspect-ratio: 16/9;
            overflow: hidden;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            display: none;
        }

        #videoPlayer.active {
            display: block;
        }

        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #333333;
        }

        .placeholder-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Controls */
        .controls-section {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .playback-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: transparent;
            border: 2px solid #333333;
            color: #ffffff;
            width: 50px;
            height: 50px;
            border-radius: 0;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            border-color: #a855f7;
            color: #a855f7;
            transform: scale(1.05);
        }

        .control-btn.play {
            width: 65px;
            height: 65px;
            font-size: 1.6rem;
            border-color: #a855f7;
            background: #a855f7;
            color: #000000;
        }

        .control-btn.play:hover {
            background: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .time-display {
            font-size: 0.9rem;
            color: #666666;
            min-width: 55px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .progress-bar-wrapper {
            flex: 1;
            position: relative;
            height: 30px;
            display: flex;
            align-items: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1a1a1a;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #7c3aed);
            width: 0%;
            position: relative;
            transition: width 0.1s linear;
        }

        .progress-handle {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #ffffff;
            border: 2px solid #a855f7;
            cursor: grab;
        }

        .progress-handle:active {
            cursor: grabbing;
            background: #a855f7;
        }

        /* Timeline / Trim Section */
        .timeline-section {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 25px;
        }

        .section-title {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trim-container {
            background: #000000;
            border: 1px solid #1a1a1a;
            padding: 25px;
            margin-bottom: 20px;
        }

        .trim-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.8rem;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .trim-slider-container {
            position: relative;
            height: 50px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
        }

        .trim-range {
            position: absolute;
            height: 100%;
            background: rgba(168, 85, 247, 0.2);
            border-top: 3px solid #a855f7;
            border-bottom: 3px solid #a855f7;
            cursor: move;
        }

        .trim-handle {
            position: absolute;
            top: 0;
            width: 15px;
            height: 100%;
            background: #a855f7;
            cursor: ew-resize;
            transition: background 0.2s;
        }

        .trim-handle:hover {
            background: #ffffff;
        }

        .trim-handle.left {
            left: -7px;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
        }

        .trim-handle.right {
            right: -7px;
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
        }

        .trim-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .trim-time {
            background: #0a0a0a;
            border: 1px solid #333333;
            padding: 8px 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #a855f7;
            font-weight: 600;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Volume Control */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 25px;
            color: #666666;
        }

        .volume-slider {
            width: 100px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: #1a1a1a;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #a855f7;
            border: 2px solid #ffffff;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Speed Control */
        .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #666666;
        }

        .speed-select {
            background: #0a0a0a;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        .speed-select:focus {
            border-color: #a855f7;
        }

        /* Effects Panel */
        .effects-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .effect-btn {
            background: transparent;
            border: 1px solid #333333;
            color: #888888;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .effect-btn:hover {
            border-color: #a855f7;
            color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }

        .effect-btn.active {
            border-color: #a855f7;
            background: #a855f7;
            color: #000000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                padding: 15px;
            }

            .header {
                padding: 15px 20px;
            }

            .logo {
                font-size: 1.2rem;
            }

            .playback-controls {
                flex-wrap: wrap;
            }

            .volume-control {
                margin-left: 0;
                margin-top: 15px;
            }
        }

        /* Loading State */
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000;
            border: 2px solid #a855f7;
            padding: 40px;
            z-index: 1000;
            text-align: center;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1a1a1a;
            border-top-color: #a855f7;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Glow effects */
        .glow-text {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <div class="logo">CosmoEditX</div>
        <div class="file-input-wrapper">
            <input type="file" id="videoInput" accept="video/*">
            <button class="btn" onclick="document.getElementById('videoInput').click()">
                + LOAD VIDEO
            </button>
        </div>
    </div>

    <div class="main-container">
        <!-- Video Preview -->
        <div class="preview-section">
            <div class="video-container">
                <video id="videoPlayer"></video>
                <div class="placeholder" id="placeholder">
                    <div class="placeholder-icon">◼</div>
                    <p style="font-size: 0.9rem; letter-spacing: 2px;">DROP VIDEO OR CLICK LOAD</p>
                </div>
            </div>
        </div>

        <!-- Playback Controls -->
        <div class="controls-section">
            <div class="progress-container">
                <span class="time-display" id="currentTime">00:00</span>
                <div class="progress-bar-wrapper">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill">
                            <div class="progress-handle"></div>
                        </div>
                    </div>
                </div>
                <span class="time-display" id="duration">00:00</span>
            </div>

            <div style="display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 25px;">
                <div class="playback-controls">
                    <button class="control-btn" id="skipBackward" title="Skip Backward 10s">◀◀</button>
                    <button class="control-btn play" id="playPause" title="Play/Pause">▶</button>
                    <button class="control-btn" id="skipForward" title="Skip Forward 10s">▶▶</button>
                    <button class="control-btn" id="stop" title="Stop">■</button>
                </div>

                <div class="volume-control">
                    <span>VOL</span>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                </div>

                <div class="speed-control">
                    <span>SPEED</span>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.25">0.25X</option>
                        <option value="0.5">0.5X</option>
                        <option value="1" selected>1.0X</option>
                        <option value="1.5">1.5X</option>
                        <option value="2">2.0X</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Timeline / Trim -->
        <div class="timeline-section">
            <div class="section-title">/// TRIM TIMELINE</div>
            <div class="trim-container">
                <div class="trim-labels">
                    <span>START POINT</span>
                    <span>END POINT</span>
                </div>
                <div class="trim-slider-container" id="trimContainer">
                    <div class="trim-range" id="trimRange" style="left: 0%; width: 100%;">
                        <div class="trim-handle left" id="trimStart"></div>
                        <div class="trim-handle right" id="trimEnd"></div>
                    </div>
                </div>
                <div class="trim-info">
                    <span class="trim-time" id="trimStartTime">00:00</span>
                    <span class="trim-time" id="trimEndTime">00:00</span>
                </div>
            </div>

            <div class="section-title" style="margin-top: 25px;">/// VISUAL EFFECTS</div>
            <div class="effects-panel">
                <button class="effect-btn active" data-effect="none">NORMAL</button>
                <button class="effect-btn" data-effect="grayscale">MONO</button>
                <button class="effect-btn" data-effect="sepia">SEPIA</button>
                <button class="effect-btn" data-effect="contrast">CONTRAST</button>
                <button class="effect-btn" data-effect="blur">BLUR</button>
                <button class="effect-btn" data-effect="brightness">BRIGHT</button>
            </div>

            <div class="actions" style="margin-top: 25px;">
                <button class="btn btn-secondary" id="resetTrim">RESET TRIM</button>
                <button class="btn btn-success" id="exportVideo">EXPORT VIDEO</button>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color: #a855f7; letter-spacing: 3px; font-weight: 600;">PROCESSING</p>
    </div>

    <script>
        // Elements
        const videoInput = document.getElementById('videoInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const placeholder = document.getElementById('placeholder');
        const playPauseBtn = document.getElementById('playPause');
        const stopBtn = document.getElementById('stop');
        const skipBackwardBtn = document.getElementById('skipBackward');
        const skipForwardBtn = document.getElementById('skipForward');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeDisplay = document.getElementById('currentTime');
        const durationDisplay = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const speedSelect = document.getElementById('speedSelect');
        const trimContainer = document.getElementById('trimContainer');
        const trimRange = document.getElementById('trimRange');
        const trimStart = document.getElementById('trimStart');
        const trimEnd = document.getElementById('trimEnd');
        const trimStartTime = document.getElementById('trimStartTime');
        const trimEndTime = document.getElementById('trimEndTime');
        const resetTrimBtn = document.getElementById('resetTrim');
        const exportBtn = document.getElementById('exportVideo');
        const effectBtns = document.querySelectorAll('.effect-btn');
        const loading = document.getElementById('loading');

        // State
        let isPlaying = false;
        let isDragging = false;
        let trimStartPercent = 0;
        let trimEndPercent = 100;
        let currentEffect = 'none';

        // Load Video
        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                videoPlayer.src = url;
                videoPlayer.classList.add('active');
                placeholder.style.display = 'none';
                videoPlayer.load();
            }
        });

        // Video Events
        videoPlayer.addEventListener('loadedmetadata', function() {
            durationDisplay.textContent = formatTime(videoPlayer.duration);
            resetTrim();
        });

        videoPlayer.addEventListener('timeupdate', function() {
            if (!isDragging) {
                const percent = (videoPlayer.currentTime / videoPlayer.duration) * 100;
                progressFill.style.width = percent + '%';
                currentTimeDisplay.textContent = formatTime(videoPlayer.currentTime);

                if (videoPlayer.currentTime >= videoPlayer.duration * (trimEndPercent / 100)) {
                    videoPlayer.currentTime = videoPlayer.duration * (trimStartPercent / 100);
                    if (!isPlaying) videoPlayer.pause();
                }
            }
        });

        videoPlayer.addEventListener('ended', function() {
            isPlaying = false;
            playPauseBtn.textContent = '▶';
        });

        // Play/Pause
        playPauseBtn.addEventListener('click', function() {
            if (videoPlayer.paused) {
                if (videoPlayer.currentTime >= videoPlayer.duration * (trimEndPercent / 100)) {
                    videoPlayer.currentTime = videoPlayer.duration * (trimStartPercent / 100);
                }
                videoPlayer.play();
                isPlaying = true;
                playPauseBtn.textContent = '⏸';
            } else {
                videoPlayer.pause();
                isPlaying = false;
                playPauseBtn.textContent = '▶';
            }
        });

        // Stop
        stopBtn.addEventListener('click', function() {
            videoPlayer.pause();
            videoPlayer.currentTime = videoPlayer.duration * (trimStartPercent / 100);
            isPlaying = false;
            playPauseBtn.textContent = '▶';
        });

        // Skip
        skipBackwardBtn.addEventListener('click', function() {
            videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime - 10);
        });

        skipForwardBtn.addEventListener('click', function() {
            videoPlayer.currentTime = Math.min(videoPlayer.duration, videoPlayer.currentTime + 10);
        });

        // Progress Bar
        progressBar.addEventListener('click', function(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            videoPlayer.currentTime = percent * videoPlayer.duration;
        });

        // Volume
        volumeSlider.addEventListener('input', function() {
            videoPlayer.volume = this.value;
        });

        // Speed
        speedSelect.addEventListener('change', function() {
            videoPlayer.playbackRate = parseFloat(this.value);
        });

        // Trim Functionality
        let isTrimming = false;
        let trimType = null;

        trimStart.addEventListener('mousedown', function(e) {
            isTrimming = true;
            trimType = 'start';
            e.preventDefault();
        });

        trimEnd.addEventListener('mousedown', function(e) {
            isTrimming = true;
            trimType = 'end';
            e.preventDefault();
        });

        trimRange.addEventListener('mousedown', function(e) {
            if (e.target === trimRange) {
                isTrimming = true;
                trimType = 'move';
                e.preventDefault();
            }
        });

        document.addEventListener('mousemove', function(e) {
            if (!isTrimming) return;

            const rect = trimContainer.getBoundingClientRect();
            const percent = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));

            if (trimType === 'start') {
                trimStartPercent = Math.min(percent, trimEndPercent - 5);
            } else if (trimType === 'end') {
                trimEndPercent = Math.max(percent, trimStartPercent + 5);
            } else if (trimType === 'move') {
                const rangeWidth = trimEndPercent - trimStartPercent;
                const newStart = Math.max(0, Math.min(100 - rangeWidth, percent - rangeWidth / 2));
                trimStartPercent = newStart;
                trimEndPercent = newStart + rangeWidth;
            }

            updateTrimUI();
        });

        document.addEventListener('mouseup', function() {
            isTrimming = false;
            trimType = null;
        });

        function updateTrimUI() {
            trimRange.style.left = trimStartPercent + '%';
            trimRange.style.width = (trimEndPercent - trimStartPercent) + '%';

            if (videoPlayer.duration) {
                const startTime = videoPlayer.duration * (trimStartPercent / 100);
                const endTime = videoPlayer.duration * (trimEndPercent / 100);
                trimStartTime.textContent = formatTime(startTime);
                trimEndTime.textContent = formatTime(endTime);
            }
        }

        function resetTrim() {
            trimStartPercent = 0;
            trimEndPercent = 100;
            updateTrimUI();
        }

        resetTrimBtn.addEventListener('click', resetTrim);

        // Effects
        effectBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                effectBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentEffect = this.dataset.effect;
                applyEffect();
            });
        });

        function applyEffect() {
            const effects = {
                'none': 'none',
                'grayscale': 'grayscale(100%)',
                'sepia': 'sepia(100%)',
                'contrast': 'contrast(150%)',
                'blur': 'blur(3px)',
                'brightness': 'brightness(150%)'
            };
            videoPlayer.style.filter = effects[currentEffect];
        }

        // Export
        exportBtn.addEventListener('click', function() {
            if (!videoPlayer.src) {
                alert('LOAD A VIDEO FIRST');
                return;
            }

            loading.classList.add('active');

            setTimeout(() => {
                loading.classList.remove('active');

                const startTime = videoPlayer.duration * (trimStartPercent / 100);
                const endTime = videoPlayer.duration * (trimEndPercent / 100);
                const duration = endTime - startTime;

                alert(`EXPORT SETTINGS\n\n` +
                      `START: ${formatTime(startTime)}\n` +
                      `END: ${formatTime(endTime)}\n` +
                      `DURATION: ${formatTime(duration)}\n` +
                      `EFFECT: ${currentEffect.toUpperCase()}\n\n` +
                      `NOTE: ACTUAL ENCODING REQUIRES SERVER-SIDE PROCESSING`);
            }, 2000);
        });

        // Helper Functions
        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;

            switch(e.key) {
                case ' ':
                    e.preventDefault();
                    playPauseBtn.click();
                    break;
                case 'ArrowLeft':
                    videoPlayer.currentTime -= 5;
                    break;
                case 'ArrowRight':
                    videoPlayer.currentTime += 5;
                    break;
            }
        });
    </script>
